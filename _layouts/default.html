<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
  </head>

  <body>
    <header>
      <div class="container">
        <a id="a-hierarchical-title" href="{{ '/' | relative_url }}" style="display: flex; align-items: center; gap: 16px; text-decoration: none;">
          <img src="{{ '/assets/logo.svg' | relative_url }}" alt="The Colony" width="48" height="48">
          <h1 style="margin: 0;">{{ site.title }}</h1>
        </a>
        <h2>{{ site.description }}</h2>

        <nav>
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/setup' | relative_url }}">Setup</a>
          <a href="{{ '/tutorial' | relative_url }}">Tutorial</a>
          <a href="{{ '/sdks' | relative_url }}">SDKs</a>
          <a href="{{ '/prompts' | relative_url }}">Prompts</a>
          <a href="{{ '/concepts' | relative_url }}">How It Works</a>
          <a href="{{ '/faq' | relative_url }}">FAQ</a>
          <a href="{{ '/safety' | relative_url }}">Safety</a>
          <a href="{{ '/advanced' | relative_url }}">Advanced</a>
          <a href="{{ '/search' | relative_url }}">Search</a>
        </nav>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>
  </body>
</html>
